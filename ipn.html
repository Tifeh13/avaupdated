<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Status — Ava Jewelry</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#D4AF37;--black:#070707;--surface:#0e0e0e;--border:rgba(212,175,55,.15);--white:#F5F0E8;--muted:rgba(245,240,232,.5);--green:#2ecc71;--red:#e74c3c;--orange:#f39c12}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--white);font-family:'Montserrat',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.box{background:var(--surface);border:1px solid var(--border);padding:3rem 2.5rem;max-width:520px;width:100%;position:relative;text-align:center}
.box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;letter-spacing:.35em;color:var(--gold);margin-bottom:2rem}
.icon{font-size:3rem;margin-bottom:1.2rem}
.title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;margin-bottom:.6rem}
.sub{font-size:.65rem;letter-spacing:.12em;color:var(--muted);line-height:1.8;margin-bottom:2rem}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:.7rem 1rem;border-bottom:1px solid var(--border);font-size:.65rem}
.detail-row:last-child{border-bottom:none}
.dl{color:var(--muted);letter-spacing:.1em}
.dv{font-family:'Montserrat',sans-serif;font-weight:500;color:var(--white)}
.dv.gold{color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:.9rem}
.status-badge{display:inline-block;font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;font-weight:700;padding:.35rem 1rem;border-radius:2px;margin-bottom:1.5rem}
.s-waiting{background:rgba(243,156,18,.12);border:1px solid rgba(243,156,18,.3);color:var(--orange)}
.s-confirming{background:rgba(52,152,219,.12);border:1px solid rgba(52,152,219,.3);color:#3498db}
.s-finished,.s-confirmed{background:rgba(46,204,113,.12);border:1px solid rgba(46,204,113,.3);color:var(--green)}
.s-failed,.s-expired{background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.3);color:var(--red)}
.address-box{background:#0a0a0a;border:1px solid var(--border);padding:.9rem 1rem;margin:1rem 0;font-family:'Courier New',monospace;font-size:.62rem;word-break:break-all;color:var(--gold);text-align:left;position:relative}
.copy-btn{position:absolute;top:.5rem;right:.5rem;background:var(--gold);color:#000;border:none;font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;padding:.25rem .6rem;cursor:pointer}
.copy-btn:hover{background:#e5bf40}
.btn{display:inline-block;background:var(--gold);color:var(--black);border:none;padding:.9rem 2.5rem;font-size:.62rem;letter-spacing:.3em;text-transform:uppercase;font-weight:700;margin-top:1.5rem;cursor:pointer;transition:background .2s}
.btn:hover{background:#e5bf40}
.btn-o{background:transparent;color:var(--white);border:1px solid var(--border);padding:.9rem 2rem}
.btn-o:hover{border-color:var(--gold);color:var(--gold)}
.pulse{animation:lp 2s ease infinite}
@keyframes lp{0%,100%{box-shadow:0 0 0 0 rgba(212,175,55,.4)}70%{box-shadow:0 0 0 10px rgba(212,175,55,0)}}
.details-section{background:#0a0a0a;border:1px solid var(--border);margin:1.2rem 0;text-align:left}
</style>
</head>
<body>

<div class="box" id="box">
  <div class="logo">AVA</div>
  <div id="content">
    <div class="icon">⟳</div>
    <div class="title">Checking Payment…</div>
    <div class="sub">Please wait while we verify your payment details.</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// IPN.HTML — NOWPayments payment status page
// Works two ways:
// 1. Customer lands here after checkout → shows their payment status
// 2. NOWPayments IPN fires → we save order data to localStorage
//    (only works if customer has this tab open — for server-side,
//     use api/ipn.js Vercel function instead)
// ═══════════════════════════════════════════════════════

const params = new URLSearchParams(location.search);
const orderId    = params.get('order_id') || params.get('id');
const paymentId  = params.get('payment_id') || params.get('pid');
const status     = params.get('payment_status') || params.get('status');
const amount     = params.get('price_amount') || params.get('amount');
const currency   = params.get('pay_currency') || params.get('currency') || 'BTC';
const cryptoAmt  = params.get('pay_amount');
const address    = params.get('pay_address');
const actualPaid = params.get('actually_paid');

// Pull cart data saved by cart.html before redirecting here
let pendingOrder = null;
try { pendingOrder = JSON.parse(sessionStorage.getItem('ava_pending_order') || 'null'); } catch(e){}

function renderStatus() {
  const content = document.getElementById('content');

  if (!orderId && !paymentId && !pendingOrder) {
    // No params — show generic payment success for IPN confirmations
    content.innerHTML = `
      <div class="icon">✓</div>
      <div class="title">Payment <em style="color:var(--gold);font-style:italic">Received</em></div>
      <div class="sub">Your payment has been confirmed by Ava Jewelry.<br>You will receive a confirmation email shortly.</div>
      <a href="shop.html" class="btn" style="text-decoration:none">Continue Shopping →</a>`;
    return;
  }

  const statusClass = {
    waiting:         's-waiting',
    confirming:      's-confirming',
    confirmed:       's-finished',
    finished:        's-finished',
    partially_paid:  's-confirming',
    failed:          's-failed',
    expired:         's-failed',
    refunded:        's-failed',
  }[status] || 's-waiting';

  const statusLabel = {
    waiting:         '⏳ Awaiting Payment',
    confirming:      '⟳ Confirming on Blockchain',
    confirmed:       '✓ Confirmed',
    finished:        '✓ Payment Complete',
    partially_paid:  '⚠ Partially Paid',
    failed:          '✕ Payment Failed',
    expired:         '✕ Payment Expired',
    refunded:        '↩ Refunded',
  }[status] || '⏳ Awaiting Payment';

  const isSuccess   = status === 'finished' || status === 'confirmed';
  const isWaiting   = status === 'waiting' || !status;
  const isPending   = status === 'confirming' || status === 'partially_paid';

  const icon = isSuccess ? '✓' : isPending ? '⟳' : isWaiting ? '💎' : '✕';
  const title = isSuccess ? 'Payment <em style="color:var(--gold);font-style:italic">Complete</em>'
              : isPending ? 'Payment <em style="color:var(--gold);font-style:italic">Confirming</em>'
              : isWaiting ? 'Awaiting Your <em style="color:var(--gold);font-style:italic">Payment</em>'
              : 'Payment <em style="color:var(--red);font-style:italic">Failed</em>';
  const sub   = isSuccess ? 'Your payment has been received and confirmed. Your order is being prepared.'
              : isPending ? 'We\'ve detected your payment. Waiting for blockchain confirmations — this usually takes 10–30 minutes.'
              : isWaiting ? `Please send exactly the amount shown below to the BTC address. Do not close this page.`
              : 'There was an issue with your payment. Please contact us or try again.';

  let addressHtml = '';
  if ((isWaiting || isPending) && address) {
    addressHtml = `
      <div style="text-align:left;margin:1rem 0">
        <div style="font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem">Send ${cryptoAmt || ''} ${currency.toUpperCase()} to:</div>
        <div class="address-box">
          ${address}
          <button class="copy-btn" onclick="copyAddr()">Copy</button>
        </div>
        <div style="font-size:.55rem;color:var(--muted);text-align:center">⚠ Send only ${currency.toUpperCase()} to this address</div>
      </div>`;
  }

  let detailsHtml = '';
  if (orderId || paymentId || amount) {
    detailsHtml = `<div class="details-section">
      ${orderId    ? `<div class="detail-row"><span class="dl">Order ID</span><span class="dv">${orderId}</span></div>` : ''}
      ${paymentId  ? `<div class="detail-row"><span class="dl">Payment ID</span><span class="dv">${paymentId}</span></div>` : ''}
      ${amount     ? `<div class="detail-row"><span class="dl">Amount</span><span class="dv gold">$${Number(amount).toLocaleString()} USD</span></div>` : ''}
      ${cryptoAmt  ? `<div class="detail-row"><span class="dl">Crypto Amount</span><span class="dv">${cryptoAmt} ${currency.toUpperCase()}</span></div>` : ''}
      ${actualPaid ? `<div class="detail-row"><span class="dl">Actually Paid</span><span class="dv" style="color:${Number(actualPaid)>0?'var(--green)':'var(--red)'}">${actualPaid} ${currency.toUpperCase()}</span></div>` : ''}
    </div>`;
  }

  content.innerHTML = `
    <div class="icon ${isPending?'pulse':''}">${icon}</div>
    <div class="status-badge ${statusClass}">${statusLabel}</div>
    <div class="title">${title}</div>
    <div class="sub">${sub}</div>
    ${addressHtml}
    ${detailsHtml}
    ${isSuccess || isPending ? `<a href="shop.html" class="btn" style="text-decoration:none;display:inline-block">Continue Shopping →</a>` : ''}
    ${isWaiting ? `<div style="font-size:.58rem;color:var(--muted);margin-top:1.5rem">This page auto-refreshes every 30 seconds</div>` : ''}`;

  // ── Save order to localStorage so admin sees it ──────────────────
  if ((isWaiting || isPending || isSuccess) && orderId) {
    saveOrderToAdmin();
  }

  // ── Auto refresh if waiting ───────────────────────────────────────
  if (isWaiting || isPending) {
    setTimeout(() => location.reload(), 30000);
  }
}

function saveOrderToAdmin() {
  try {
    const orders = JSON.parse(localStorage.getItem('ava_orders') || '[]');
    const exists = orders.findIndex(o => o.id === orderId || o.paymentId === paymentId);

    // Build customer info from pending order if available
    const co = pendingOrder || {};
    const order = {
      id:             orderId || `AVA-NP-${paymentId}`,
      date:           co.date || new Date().toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}),
      firstName:      co.firstName || co.first_name || '',
      lastName:       co.lastName  || co.last_name  || '',
      email:          co.email || '',
      phone:          co.phone || '',
      addr1:          co.addr1 || co.address || '',
      addr2:          co.addr2 || '',
      city:           co.city || '',
      state:          co.state || '',
      zip:            co.zip || '',
      country:        co.country || '',
      payMethod:      currency.toLowerCase() === 'btc' ? 'btc' : currency.toLowerCase() === 'eth' ? 'eth' : 'crypto',
      paymentId:      paymentId || '',
      payinAddress:   address || co.payinAddress || '',
      cryptoAmount:   cryptoAmt || '',
      cryptoCurrency: currency.toUpperCase(),
      cryptoPaid:     actualPaid || '0',
      cryptoStatus:   status || 'waiting',
      total:          Number(amount) || co.total || 0,
      subtotal:       Number(amount) || co.total || 0,
      tax:            co.tax || 0,
      shipping:       co.shipping || 0,
      items:          co.items || [],
    };

    if (exists >= 0) {
      // Update existing order with latest payment status
      orders[exists] = { ...orders[exists], ...order };
    } else {
      orders.unshift(order);
    }
    localStorage.setItem('ava_orders', JSON.stringify(orders));
    // Clear pending order from session
    sessionStorage.removeItem('ava_pending_order');
  } catch(e) {
    console.error('Failed to save order:', e);
  }
}

function copyAddr() {
  navigator.clipboard.writeText(address).then(() => {
    document.querySelector('.copy-btn').textContent = 'Copied!';
    setTimeout(() => document.querySelector('.copy-btn').textContent = 'Copy', 2000);
  });
}

renderStatus();
</script>
</body>
</html>
